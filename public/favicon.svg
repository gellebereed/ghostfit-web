<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="ghostGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="50%" stop-color="#00DF9A" />
      <stop offset="100%" stop-color="#60EFFF" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <filter id="neonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#00FF87" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="#60EFFF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#ghostGlow)" stroke-width="4" stroke-opacity="0.4"/>

  <!-- Ghost Emblem Group -->
  <g filter="url(#neonShadow)" transform="translate(0, 8)">
    <!-- Main Hood / Ghost Head -->
    <path d="M 256 100 
             C 170 100, 130 160, 130 250 
             L 130 370 
             L 172 340 
             L 214 370 
             L 256 340 
             L 298 370 
             L 340 340 
             L 382 370 
             L 382 250 
             C 382 160, 342 100, 256 100 Z" 
          fill="url(#ghostGlow)" />
    
    <!-- Eyes - Aggressive/Athletic Angled Cuts -->
    <path d="M 185 210 Q 220 230 235 240 Q 210 248 180 240 Z" fill="#0A0A0A" />
    <path d="M 327 210 Q 292 230 277 240 Q 302 248 332 240 Z" fill="#0A0A0A" />
    
    <!-- Inner Glowing Pupils -->
    <circle cx="210" cy="232" r="6" fill="#00FF87" />
    <circle cx="302" cy="232" r="6" fill="#00FF87" />

    <!-- Dumbbell / Combat Core Motif on Chest -->
    <path d="M 226 290 L 286 290 M 230 282 L 230 298 M 282 282 L 282 298" 
          stroke="#0A0A0A" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
